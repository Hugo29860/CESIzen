name: CESIzen – CI/CD Pipeline

# ─────────────────────────────────────────────
# Déclencheurs
# ─────────────────────────────────────────────
on:
  push:
    branches:
      - main       # Déploiement en production
      - develop    # Intégration continue uniquement
  pull_request:
    branches:
      - main
      - develop

# ─────────────────────────────────────────────
# Variables d'environnement globales
# ─────────────────────────────────────────────
env:
  NODE_VERSION: "18"
  APP_NAME: "cesizen"

# ─────────────────────────────────────────────
# JOBS
# ─────────────────────────────────────────────
jobs:

  # ══════════════════════════════════════════
  # JOB 1 : Intégration Continue (CI)
  # Lint + Build — s'exécute sur toutes les branches
  # ══════════════════════════════════════════
  ci:
    name: "🔍 Lint & Build"
    runs-on: ubuntu-latest

    steps:
      # 1. Récupération du code source
      - name: "📥 Checkout du code"
        uses: actions/checkout@v4

      # 2. Configuration de Node.js avec cache npm
      - name: "⚙️  Setup Node.js ${{ env.NODE_VERSION }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # 3. Installation des dépendances (reproductible avec ci)
      - name: "📦 Installation des dépendances frontend"
        run: npm ci

      # 4. Lint ESLint (si configuré)
      # Crée un .eslintrc.cjs minimal si absent pour ne pas bloquer le pipeline
      - name: "🔎 Lint ESLint"
        run: |
          if [ -f ".eslintrc.cjs" ] || [ -f "eslint.config.js" ] || [ -f ".eslintrc.json" ]; then
            npx eslint src/ --ext .vue,.js --max-warnings=0
          else
            echo "ℹ️  Aucune config ESLint trouvée – étape ignorée"
          fi

      # 5. Build Vite de production
      - name: "🏗️  Build Vite (production)"
        run: npm run build
        env:
          NODE_ENV: production

      # 6. Vérification que le dossier dist/ est bien généré
      - name: "✅ Vérification du build"
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Le dossier dist/ est absent – build échoué"
            exit 1
          fi
          echo "✅ Build OK – $(find dist -type f | wc -l) fichiers générés"

      # 7. Upload de l'artifact dist/ pour le job de déploiement
      - name: "📤 Upload artifact dist/"
        uses: actions/upload-artifact@v4
        with:
          name: cesizen-dist
          path: dist/
          retention-days: 7

  # ══════════════════════════════════════════
  # JOB 2 : Déploiement en Production
  # Uniquement sur push vers main, après succès du CI
  # ══════════════════════════════════════════
  deploy:
    name: "🚀 Déploiement Production"
    runs-on: ubuntu-latest
    needs: ci                          # Dépend du job CI
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://cesizen.cesi.fr     # URL affichée dans GitHub Environments

    steps:
      # 1. Récupération du code (pour le backend)
      - name: "📥 Checkout du code"
        uses: actions/checkout@v4

      # 2. Téléchargement de l'artifact frontend
      - name: "📥 Download artifact dist/"
        uses: actions/download-artifact@v4
        with:
          name: cesizen-dist
          path: dist/

      # 3. Configuration de l'agent SSH
      - name: "🔑 Configuration SSH"
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 4. Ajout du serveur aux known_hosts (évite les prompts interactifs)
      - name: "🔐 Ajout aux known_hosts"
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # 5. Déploiement du frontend (dist/ → /var/www/cesizen/)
      - name: "📡 Déploiement Frontend"
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/cesizen/

      # 6. Déploiement du backend (hors node_modules)
      - name: "📡 Déploiement Backend"
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='.git' \
            backend/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/app/cesizen-backend/

      # 7. Installation des dépendances backend sur le serveur + redémarrage PM2
      - name: "♻️  Redémarrage du serveur (PM2)"
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
            cd /app/cesizen-backend
            npm ci --omit=dev
            pm2 reload cesizen-backend --update-env || pm2 start server.js --name cesizen-backend
            pm2 save
          ENDSSH

      # 8. Smoke tests – vérification que l'API répond
      - name: "🧪 Smoke Tests (vérification API)"
        run: |
          sleep 10  # Laisse le temps à PM2 de redémarrer
          
          echo "Test 1 – Health check API..."
          curl -f --max-time 10 https://api.cesizen.cesi.fr/ \
            && echo "✅ API en ligne" \
            || (echo "❌ API inaccessible" && exit 1)

          echo "Test 2 – Route exercises accessible..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            https://api.cesizen.cesi.fr/api/exercises)
          if [ "$STATUS" = "200" ]; then
            echo "✅ GET /api/exercises → $STATUS"
          else
            echo "❌ GET /api/exercises → $STATUS"
            exit 1
          fi

          echo "Test 3 – Route ressources accessible..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            https://api.cesizen.cesi.fr/api/ressources)
          if [ "$STATUS" = "200" ]; then
            echo "✅ GET /api/ressources → $STATUS"
          else
            echo "❌ GET /api/ressources → $STATUS"
            exit 1
          fi

      # 9. Notification de succès (résumé dans le job)
      - name: "📣 Résumé du déploiement"
        if: success()
        run: |
          echo "## ✅ Déploiement réussi !" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Élément | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 URL Frontend | https://cesizen.cesi.fr |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔌 URL API | https://api.cesizen.cesi.fr |" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 Date | $(date '+%d/%m/%Y %H:%M') UTC |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 👤 Déclenché par | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

      # 10. Notification d'échec
      - name: "🚨 Notification d'échec"
        if: failure()
        run: |
          echo "## ❌ Déploiement échoué" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Un problème est survenu lors du déploiement." >> $GITHUB_STEP_SUMMARY
          echo "Consultez les logs ci-dessus pour identifier la cause." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Procédure de rollback :** voir le Plan de Déploiement, section 6." >> $GITHUB_STEP_SUMMARY